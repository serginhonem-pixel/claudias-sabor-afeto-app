
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Poppins:wght@300;400;600&display=swap');

  #splash {
    position: relative;
    width: 100%;
    min-height: 520px;
    background: #F6EFE1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 12px;
    border: 0.5px solid #E0D5C5;
  }

  #splash-bg {
    position: absolute;
    inset: 0;
    background: #45291A;
    transform: translateY(0%);
    transition: transform 1.1s cubic-bezier(0.76, 0, 0.24, 1);
    z-index: 0;
  }

  #splash.revealed #splash-bg {
    transform: translateY(-100%);
  }

  #splash-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #logo-wrap {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #splash.step1 #logo-wrap { opacity: 1; transform: translateY(0); }

  #logo-svg {
    width: 220px;
    height: auto;
    display: block;
  }

  #tagline {
    font-family: 'Lora', serif;
    font-size: 15px;
    color: #D8B974;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
    margin-top: 6px;
  }
  #splash.step1 #tagline { opacity: 1; transform: translateY(0); }

  #ornam {
    margin-top: 22px;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.5s ease 0.45s;
  }
  #splash.step1 #ornam { opacity: 1; }

  .ornam-line {
    width: 52px;
    height: 0.6px;
    background: #D8B974;
  }
  .ornam-diamond {
    width: 5px;
    height: 5px;
    background: #D8B974;
    transform: rotate(45deg);
  }

  #enter-btn {
    margin-top: 36px;
    font-family: 'Poppins', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #45291A;
    background: #D8B974;
    border: none;
    border-radius: 0;
    padding: 11px 34px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease 0.65s, transform 0.5s ease 0.65s, background 0.2s;
  }
  #splash.step1 #enter-btn { opacity: 1; transform: translateY(0); }
  #enter-btn:hover { background: #BD9145; }

  #particles {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #D8B974;
    border-radius: 50%;
    opacity: 0;
  }

  #preview-label {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-family: 'Poppins', sans-serif;
    font-size: 10px;
    color: rgba(69,41,26,0.35);
    z-index: 10;
    letter-spacing: 0.05em;
  }

  #replay-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    font-family: 'Poppins', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #BD9145;
    background: transparent;
    border: 0.5px solid #BD9145;
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    z-index: 20;
    transition: background 0.2s, color 0.2s;
  }
  #replay-btn:hover { background: #BD9145; color: #F6EFE1; }

  #app-preview {
    display: none;
    width: 100%;
    min-height: 520px;
    background: #F6EFE1;
    border-radius: 12px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  #app-preview.visible {
    display: flex;
  }
  #app-preview p {
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    color: #45291A;
    opacity: 0.6;
  }
  #app-preview h3 {
    font-family: 'Lora', serif;
    font-size: 22px;
    color: #45291A;
    margin: 0;
  }
</style>

  <button onclick="replay()" style="font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:#BD9145;background:transparent;border:0.5px solid #BD9145;border-radius:4px;padding:7px 16px;cursor:pointer;margin-top:8px;">Ver splash novamente</button>

<script>
  function initParticles() {
    const container = document.getElementById('particles');
    container.innerHTML = '';
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      container.appendChild(p);
    }
  }

  function animateParticles() {
    const particles = document.querySelectorAll('.particle');
    particles.forEach((p, i) => {
      const delay = Math.random() * 600 + 200;
      const dur = Math.random() * 1200 + 800;
      const tx = (Math.random() - 0.5) * 60;
      const ty = -(Math.random() * 80 + 30);
      setTimeout(() => {
        p.style.transition = `opacity ${dur}ms ease, transform ${dur}ms ease`;
        p.style.opacity = '0.5';
        p.style.transform = `translate(${tx}px, ${ty}px)`;
        setTimeout(() => {
          p.style.opacity = '0';
        }, dur * 0.6);
      }, delay);
    });
  }

  function enterApp() {
    const splash = document.getElementById('splash');
    splash.classList.add('revealed');
    animateParticles();
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('app-preview').classList.add('visible');
    }, 1100);
  }

  function replay() {
    const splash = document.getElementById('splash');
    const app = document.getElementById('app-preview');
    app.classList.remove('visible');
    splash.style.display = 'flex';
    splash.classList.remove('revealed', 'step1');
    initParticles();
    setTimeout(() => splash.classList.add('step1'), 80);
  }

  initParticles();
  setTimeout(() => document.getElementById('splash').classList.add('step1'), 300);
</script>
